services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-vorota}
      POSTGRES_USER: ${DB_USER:-vorota}
      # Без дефолта: задайте DB_PASSWORD в .env (слабый vorota больше не подставляется)
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vorota}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DB_ENGINE: postgresql
      DB_NAME: ${DB_NAME:-vorota}
      DB_USER: ${DB_USER:-vorota}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      TRUST_PROXY_HEADERS: "True"
      SITE_URL: ${SITE_URL:-https://vorota-rb.by}
      # Публичный домен обязателен на проде (см. .env.example / runbook).
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend,vorota-rb.by,www.vorota-rb.by}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set CSRF_TRUSTED_ORIGINS in .env}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      ENABLE_DJANGO_ADMIN: ${ENABLE_DJANGO_ADMIN:-False}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-False}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-5}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Только localhost: наружу не светим gunicorn (трафик /api/ — через nginx).
      # Для отладки с другой машины временно уберите 127.0.0.1:.
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    ports:
      - "80:80"
    volumes:
      # Общий volume с backend: nginx отдаёт /media/ напрямую (см. nginx.conf).
      - media_data:/var/media:ro
      - prerendered_data:/usr/share/nginx/html/_prerendered
    depends_on:
      - backend

  # Генерирует статические HTML-снапшоты страниц для поисковых роботов
  # (см. frontend/prerender/ и nginx.conf). Не запускается автоматически —
  # только по требованию:
  #   docker compose run --rm prerender
  # Повторяйте после существенных правок контента (см. README.md).
  prerender:
    build: ./frontend/prerender
    profiles: ["prerender"]
    environment:
      BASE_URL: http://frontend
      OUT_DIR: /output
    volumes:
      - prerendered_data:/output
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  media_data:
  prerendered_data:
