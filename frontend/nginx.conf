# Dynamic rendering: поисковым роботам и соцсетям-парсерам ссылок отдаём
# заранее сгенерированный статический HTML-снапшот страницы (см.
# frontend/prerender/), обычные посетители — как раньше, обычный SPA
# (index.html + JS). Список UA — основные поисковики и боты соцсетей/
# мессенджеров для превью ссылок. Puppeteer, который сам генерирует
# снапшоты, использует обычный UA headless-Chrome и сюда не попадает —
# иначе он не смог бы прогрузить настоящее SPA для рендеринга.
map $http_user_agent $vorota_is_bot {
    default 0;
    "~*(?i)(googlebot|adsbot-google|mediapartners-google|bingbot|msnbot|yandexbot|yandex\.com/bots|baiduspider|duckduckbot|slurp|sogou|exabot|facebookexternalhit|facebot|twitterbot|linkedinbot|telegrambot|whatsapp|discordbot|slackbot|applebot|pinterestbot|redditbot|semrushbot|ahrefsbot|mj12bot|dotbot|petalbot|bytespider)" 1;
}

# По умолчанию в образе nginx:alpine gzip выключен — ни JS/CSS сборки, ни
# JSON от API (проксируется этим же nginx) не сжимались вообще. На мобильном
# интернете это самое дешёвое и заметное ускорение из возможных.
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 512;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    text/xml
    application/xml
    application/json
    application/javascript
    application/x-javascript
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Базовый CSP для HTML SPA (Django CSP покрывает только /api/).
    # script-src 'unsafe-inline' — Vite; style — CSS; analytics — те же источники, что в Django middleware.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://mc.yandex.ru https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://mc.yandex.ru https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; frame-src https://yandex.ru https://yandex.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Канонический домен — без www (см. SITE_URL и sitemap.xml). На
    # localhost/дев-окружении условие никогда не сработает, безопасно.
    if ($host = 'www.vorota-rb.by') {
        return 301 https://vorota-rb.by$request_uri;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Загруженные через админку изображения (лого, фото каталога) — имя
        # файла не меняется при замене, поэтому без immutable, но кэш на
        # неделю всё равно ускоряет повторные заходы и сглаживает Core Web
        # Vitals.
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /robots.txt {
        proxy_pass http://backend:8000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Статические файлы сборки Vite — общие что для людей, что для ботов
    # (dynamic rendering их не касается), поэтому отдельные location'ы ДО
    # общего "location /". Имена файлов содержат content-hash, поэтому
    # старая версия никогда не будет отдана под тем же именем — можно
    # спокойно кэшировать надолго (это же и ускоряет Core Web Vitals).
    location ~* \.(?:js|mjs|css|woff2?|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location / {
        # Единственное безопасное применение `if` в location по версии самой
        # nginx (только rewrite+last, ничего больше) — не путать с
        # try_files/другой логикой внутри if, вот это как раз считается злом.
        if ($vorota_is_bot) {
            rewrite ^(.*)$ /_prerendered$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Снапшоты, собранные frontend/prerender/prerender.mjs. Отдаём только
    # через внутренний rewrite выше — напрямую по /_prerendered/... снаружи
    # не достучаться (internal).
    location /_prerendered/ {
        internal;
        alias /usr/share/nginx/html/_prerendered/;
        try_files $uri $uri/index.html @spa;
    }

    # Сюда попадают только боты (см. location /) на путях, для которых нет
    # готового снапшота — то есть страница либо реально не существует, либо
    # ещё не попала в последний прогон prerender. Отдаём настоящий 404, а не
    # 200 с пустым SPA-шеллом: иначе поисковик считает несуществующую
    # страницу существующей ("мягкий 404", штрафуется в Search Console).
    location @spa {
        default_type text/plain;
        return 404 "404 Not Found";
    }
}
